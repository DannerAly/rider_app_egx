<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Package icon centered -->
  <g transform="translate(256,265)">
    <!-- Box body -->
    <path d="M-90 -16 L0 -70 L90 -16 L90 90 L0 144 L-90 90 Z"
          fill="none" stroke="white" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Top lid line -->
    <path d="M-90 -16 L0 38 L90 -16"
          fill="none" stroke="white" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Center vertical -->
    <line x1="0" y1="38" x2="0" y2="144"
          stroke="white" stroke-width="14" stroke-linecap="round"/>
    <!-- Ribbon -->
    <line x1="-26" y1="-48" x2="26" y2="-48"
          stroke="rgba(255,255,255,0.5)" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
